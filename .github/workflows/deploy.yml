name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

env:
  NODE_VERSION: '20'
  APP_NAME: node56
  DOCKER_IMAGE: node56-app

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Lint
  # ─────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  # ─────────────────────────────────────────────
  # JOB 2: Test
  # ─────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: node56_test_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      PORT: 3000
      APP_NAME: node56
      APP_VERSION: 1.0.0
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: node56_test_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_SSL: false
      LOG_LEVEL: error

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm test

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  # ─────────────────────────────────────────────
  # JOB 3: Build
  # ─────────────────────────────────────────────
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          target: production
          push: false
          tags: ${{ env.DOCKER_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          outputs: type=docker,dest=/tmp/docker-image.tar

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: /tmp/docker-image.tar
          retention-days: 1

  # ─────────────────────────────────────────────
  # JOB 4: Deploy to AWS EC2
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy to AWS EC2
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    environment:
      name: production
      url: http://${{ secrets.EC2_HOST }}:${{ secrets.APP_PORT || '3000' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Docker image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: /tmp

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Copy Docker image to EC2
        run: |
          scp -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            /tmp/docker-image.tar \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/tmp/docker-image.tar

      - name: Copy docker-compose and env to EC2
        run: |
          scp -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            docker-compose.yml \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/opt/${{ env.APP_NAME }}/docker-compose.yml

      - name: Deploy on EC2
        run: |
          ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'ENDSSH'

            set -e

            APP_DIR="/opt/node56"
            IMAGE_NAME="node56-app"
            IMAGE_TAG="${{ github.sha }}"

            # Ensure app directory exists
            mkdir -p "$APP_DIR"
            cd "$APP_DIR"

            # Load the Docker image
            echo "Loading Docker image..."
            docker load -i /tmp/docker-image.tar
            docker tag "${IMAGE_NAME}:${IMAGE_TAG}" "${IMAGE_NAME}:latest"

            # Write environment file from secrets
            cat > .env << EOF
          NODE_ENV=production
          PORT=${{ secrets.APP_PORT || '3000' }}
          APP_NAME=node56
          APP_VERSION=1.0.0
          DB_HOST=${{ secrets.DB_HOST }}
          DB_PORT=${{ secrets.DB_PORT || '5432' }}
          DB_NAME=${{ secrets.DB_NAME }}
          DB_USER=${{ secrets.DB_USER }}
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          DB_SSL=${{ secrets.DB_SSL || 'true' }}
          DB_POOL_MAX=10
          DB_POOL_MIN=2
          LOG_LEVEL=info
          CORS_ORIGIN=${{ secrets.CORS_ORIGIN || '*' }}
          EOF

            # Pull and restart using docker-compose
            echo "Stopping existing containers..."
            docker-compose down --remove-orphans || true

            echo "Starting updated containers..."
            docker-compose up -d app

            # Wait for the app to be healthy
            echo "Waiting for application to be healthy..."
            RETRIES=0
            MAX_RETRIES=30
            until curl -sf http://localhost:${{ secrets.APP_PORT || '3000' }}/health > /dev/null 2>&1; do
              RETRIES=$((RETRIES+1))
              if [ "$RETRIES" -ge "$MAX_RETRIES" ]; then
                echo "Application failed to become healthy after ${MAX_RETRIES} retries."
                docker-compose logs app
                exit 1
              fi
              echo "Waiting for app... attempt $RETRIES/$MAX_RETRIES"
              sleep 5
            done

            echo "Deployment successful! Application is healthy."

            # Clean up old images
            docker image prune -f || true
            rm -f /tmp/docker-image.tar

          ENDSSH

      - name: Verify deployment
        run: |
          sleep 5
          curl -f http://${{ secrets.EC2_HOST }}:${{ secrets.APP_PORT || '3000' }}/health \
            || (echo "Health check failed after deployment" && exit 1)
          echo "Deployment verified successfully."

      - name: Clean up SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key